    <script>
      const REGION_COLORS = {
        Hovedstaden: "var(--region-hovedstaden)",
        Sjælland: "var(--region-sjaelland)",
        Syddanmark: "var(--region-syddanmark)",
        Midtjylland: "var(--region-midtjylland)",
        Nordjylland: "var(--region-nordjylland)",
      };

      const tooltip = document.getElementById("tooltip");
      const tooltipName = document.getElementById("tooltip-name");
      const tooltipDetail = document.getElementById("tooltip-detail");
      const paths = document.querySelectorAll(".municipality");

      // Apply region colors
      paths.forEach((path) => {
        const region = path.dataset.region;
        if (region && REGION_COLORS[region]) {
          path.style.fill = REGION_COLORS[region];
        }
      });

      // Tooltip interaction
      paths.forEach((path) => {
        path.addEventListener("mouseenter", () => {
          const name = path.dataset.name;
          const code = path.dataset.code;
          const region = path.dataset.region;

          tooltipName.textContent = name + " Kommune";
          tooltipDetail.textContent = region + " · " + code;
          tooltip.classList.add("visible");

          paths.forEach((p) => {
            if (p.dataset.region !== region) p.classList.add("dimmed");
          });
          path.classList.add("active");
        });

        path.addEventListener("mouseleave", () => {
          tooltip.classList.remove("visible");
          paths.forEach((p) => {
            p.classList.remove("dimmed");
            p.classList.remove("active");
          });
        });

        path.addEventListener("mousemove", (e) => {
          tooltip.style.left = e.clientX + 16 + "px";
          tooltip.style.top = e.clientY - 8 + "px";

          const rect = tooltip.getBoundingClientRect();
          if (rect.right > window.innerWidth - 8) {
            tooltip.style.left = e.clientX - rect.width - 16 + "px";
          }
          if (rect.bottom > window.innerHeight - 8) {
            tooltip.style.top = e.clientY - rect.height - 8 + "px";
          }
        });
      });

      // Legend region hover
      document.querySelectorAll(".legend-list li").forEach((li) => {
        li.addEventListener("mouseenter", () => {
          const region = li.dataset.region;
          paths.forEach((p) => {
            if (p.dataset.region !== region) {
              p.classList.add("dimmed");
            } else {
              p.classList.add("region-highlight");
            }
          });
        });
        li.addEventListener("mouseleave", () => {
          paths.forEach((p) => {
            p.classList.remove("dimmed");
            p.classList.remove("region-highlight");
          });
        });
      });
    </script>
